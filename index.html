<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="AI 作業簿 - 線上免費書法字帖生成器，支援田字格、米字格、注音與拼音，適合兒童練字與書法練習。">
    <meta name="keywords" content="字帖, 練字, 書法, 田字格, 注音, 拼音, 學習單, AI生成">
    <meta property="og:title" content="AI 作業簿 - 書法字帖生成">
    <meta property="og:description" content="自定義文字內容，一鍵生成精美練字帖。">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/2903/2903554.png">
    
    <title>AI 作業簿 - 線上字帖生成器</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖌️</text></svg>">

    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        seal: { 500: '#b91c1c', 600: '#991b1b' }, // 印泥紅
                        rice: { 50: '#faf9f6', 100: '#f5f4f0' }   // 宣紙白
                    }
                }
            }
        }
    </script>
    
    <!-- React Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* 全域介面字體設定 */
        body, input, textarea, button, select { 
            font-family: "Noto Serif TC", serif; 
        }

        /* 習字帖練習字專用 (楷體) */
        .font-kaiti {
            font-family: "KaiTi", "BiauKai", "DFKai-SB", "STKaiti", "Kaiti SC", "AR PL UKai TW", "AR PL UKai CN", "Noto Serif TC", serif;
        }

        /* 移除數字輸入框的上下箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
          -webkit-appearance: none; 
          margin: 0; 
        }
        input[type=number] { -moz-appearance: textfield; }

        /* 自定義捲軸 (現代細緻風格) */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }

        /* 初始 Loading 動畫樣式 */
        #initial-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #faf9f6; z-index: 9999;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #e7e5e4; border-top: 3px solid #b91c1c;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 隱藏捲軸但允許滾動 (A4預覽區專用) */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-rice-100 text-stone-800">
    <!-- 初始載入畫面 -->
    <div id="root">
        <div id="initial-loader">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #78716c; font-weight: 500; letter-spacing: 0.05em;">硯墨準備中...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- Icons (SVG) ---
        const IconBase = ({ children, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                {children}
            </svg>
        );

        const Download = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>;
        const Grid3X3 = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></IconBase>;
        const Type = (props) => <IconBase {...props}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></IconBase>;
        const Settings2 = (props) => <IconBase {...props}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></IconBase>;
        const Palette = (props) => <IconBase {...props}><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></IconBase>;
        const Info = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></IconBase>;
        const PenTool = (props) => <IconBase {...props}><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></IconBase>;
        const LayoutTemplate = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><rect width="18" height="6" x="3" y="3" rx="2" ry="2"/><path d="M9 21V9"/></IconBase>;

        // --- Helper: Dynamic Script Loader ---
        const loadScript = (src) => {
            return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) {
                    resolve();
                    return;
                }
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        };

        const App = () => {
            // State
            const [gridType, setGridType] = useState('mi'); 
            const [gridColor, setGridColor] = useState('red'); 
            const [phoneticType, setPhoneticType] = useState('none'); 
            const [rows, setRows] = useState(10);
            const [cols, setCols] = useState(6);
            const [isGenerating, setIsGenerating] = useState(false);
            const [cellSize, setCellSize] = useState(0); 
            
            // Text Input State
            const [inputText, setInputText] = useState('');
            const [textMode, setTextMode] = useState('trace'); 

            const printRef = useRef(null);

            // Auto-calculate cell size to fit A4
            useEffect(() => {
                const margin = 15; 
                const safetyBuffer = 2; 
                const availableWidth = 210 - (margin * 2) - safetyBuffer;
                const availableHeight = 297 - (margin * 2) - safetyBuffer;
                
                let widthRatio = 1;
                let heightRatio = 1;

                if (phoneticType === 'zhuyin') { widthRatio = 1.35; }
                else if (phoneticType === 'pinyin') { heightRatio = 1.35; }
                else if (phoneticType === 'both') { widthRatio = 1.35; heightRatio = 1.35; }

                const maxS_byWidth = availableWidth / (cols * widthRatio);
                const maxS_byHeight = availableHeight / (rows * heightRatio);
                
                setCellSize(Math.max(5, Math.min(maxS_byWidth, maxS_byHeight)));
            }, [rows, cols, phoneticType]);

            // Color definitions
            const colors = {
                red: { stroke: '#c82829', name: '朱印', border: '1px solid #c82829', dashed: '1px dashed #c82829' },
                black: { stroke: '#292524', name: '墨黑', border: '1px solid #292524', dashed: '1px dashed #292524' },
                green: { stroke: '#166534', name: '竹青', border: '1px solid #166534', dashed: '1px dashed #166534' },
            };

            // Export PDF
            const handleExportPdf = async () => {
                setIsGenerating(true);
                try {
                    if (!window.html2pdf) {
                        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js');
                    }
                    const element = printRef.current;
                    const opt = {
                        margin: 0,
                        filename: 'AI_作業簿_字帖.pdf',
                        image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { scale: 2, useCORS: true, logging: false, scrollY: 0 },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    };
                    await window.html2pdf().set(opt).from(element).save();
                } catch (err) {
                    console.error(err);
                    alert("PDF 生成失敗，請檢查網路連線。");
                } finally {
                    setIsGenerating(false);
                }
            };

            const GridLines = ({ type, color }) => {
                const dashedStyle = colors[color].dashed;
                const lineBase = "absolute pointer-events-none";

                const renderInner = () => {
                    switch (type) {
                        case 'tian':
                            return (
                                <>
                                <div className={lineBase} style={{ top: 0, bottom: 0, left: '50%', borderLeft: dashedStyle }}></div>
                                <div className={lineBase} style={{ left: 0, right: 0, top: '50%', borderTop: dashedStyle }}></div>
                                </>
                            );
                        case 'mi':
                            return (
                                <>
                                <div className={lineBase} style={{ top: 0, bottom: 0, left: '50%', borderLeft: dashedStyle }}></div>
                                <div className={lineBase} style={{ left: 0, right: 0, top: '50%', borderTop: dashedStyle }}></div>
                                <div className={lineBase} style={{ width: '141.4%', height: '1px', top: '50%', left: '50%', borderTop: dashedStyle, transform: 'translate(-50%, -50%) rotate(45deg)' }}></div>
                                <div className={lineBase} style={{ width: '141.4%', height: '1px', top: '50%', left: '50%', borderTop: dashedStyle, transform: 'translate(-50%, -50%) rotate(-45deg)' }}></div>
                                </>
                            );
                        case 'huigong':
                            return <div className={lineBase} style={{ top: '25%', left: '25%', width: '50%', height: '50%', border: dashedStyle }}></div>;
                        case 'jiugong':
                            return (
                                <>
                                <div className={lineBase} style={{ top: 0, bottom: 0, left: '33.33%', borderLeft: dashedStyle }}></div>
                                <div className={lineBase} style={{ top: 0, bottom: 0, left: '66.66%', borderLeft: dashedStyle }}></div>
                                <div className={lineBase} style={{ left: 0, right: 0, top: '33.33%', borderTop: dashedStyle }}></div>
                                <div className={lineBase} style={{ left: 0, right: 0, top: '66.66%', borderTop: dashedStyle }}></div>
                                </>
                            );
                        default: return null;
                    }
                };
                return <div className="w-full h-full relative overflow-hidden">{renderInner()}</div>;
            };

            const CellUnit = ({ size, char, mode }) => {
                let totalWidth = size;
                let totalHeight = size;
                const borderStyle = colors[gridColor].border;

                const renderChar = () => {
                    if (!char || mode === 'none') return null;
                    const style = {
                        fontSize: `${size * 0.75}mm`,
                        lineHeight: `${size}mm`,
                        color: mode === 'trace' ? 'rgba(0,0,0,0.25)' : 'black',
                        fontWeight: 'normal',
                        position: 'absolute', width: '100%', height: '100%',
                        textAlign: 'center', top: 0, left: 0, zIndex: 10, pointerEvents: 'none',
                    };
                    return <span className="font-kaiti" style={style}>{char}</span>;
                };

                const GridBox = () => (
                    <div className="w-full h-full relative">
                        <GridLines type={gridType} color={gridColor} />
                        {renderChar()}
                    </div>
                );

                if (phoneticType === 'zhuyin') {
                    const phoneticWidth = size / 3;
                    totalWidth = size + phoneticWidth;
                    return (
                        <div style={{ width: `${totalWidth}mm`, height: `${totalHeight}mm`, display: 'flex', borderRight: borderStyle, borderBottom: borderStyle, boxSizing: 'border-box' }}>
                            <div style={{ width: `${size}mm`, height: `${size}mm`, borderRight: borderStyle }} className="relative"><GridBox /></div>
                            <div style={{ width: `${phoneticWidth}mm`, height: `${size}mm` }}></div>
                        </div>
                    );
                }
                if (phoneticType === 'pinyin') {
                    const phoneticHeight = size / 3;
                    totalHeight = size + phoneticHeight;
                    return (
                        <div style={{ width: `${totalWidth}mm`, height: `${totalHeight}mm`, display: 'flex', flexDirection: 'column', borderRight: borderStyle, borderBottom: borderStyle, boxSizing: 'border-box' }}>
                            <div style={{ width: `${size}mm`, height: `${phoneticHeight}mm`, borderBottom: borderStyle, display: 'flex', flexDirection: 'column' }}>
                                <div className="flex-1 border-b" style={{ borderColor: colors[gridColor].stroke, opacity: 0.3 }}></div>
                                <div className="flex-1 border-b" style={{ borderColor: colors[gridColor].stroke, opacity: 0.3 }}></div>
                                <div className="flex-1"></div>
                            </div>
                            <div style={{ width: `${size}mm`, height: `${size}mm` }} className="relative"><GridBox /></div>
                        </div>
                    );
                }
                if (phoneticType === 'both') {
                    const phoneticHeight = size / 3;
                    const phoneticWidth = size / 3;
                    totalWidth = size + phoneticWidth;
                    totalHeight = size + phoneticHeight;
                    return (
                        <div style={{ width: `${totalWidth}mm`, height: `${totalHeight}mm`, display: 'flex', flexDirection: 'column', borderRight: borderStyle, borderBottom: borderStyle, boxSizing: 'border-box' }}>
                            <div style={{ display: 'flex', width: '100%', height: `${phoneticHeight}mm` }}>
                                <div style={{ width: `${size}mm`, height: `100%`, borderBottom: borderStyle, borderRight: borderStyle, display: 'flex', flexDirection: 'column' }}>
                                    <div className="flex-1 border-b" style={{ borderColor: colors[gridColor].stroke, opacity: 0.3 }}></div>
                                    <div className="flex-1 border-b" style={{ borderColor: colors[gridColor].stroke, opacity: 0.3 }}></div>
                                    <div className="flex-1"></div>
                                </div>
                                <div style={{ width: `${phoneticWidth}mm`, height: `100%`, borderBottom: borderStyle }}></div>
                            </div>
                            <div style={{ display: 'flex', width: '100%', height: `${size}mm` }}>
                                <div style={{ width: `${size}mm`, height: `100%`, borderRight: borderStyle }} className="relative"><GridBox /></div>
                                <div style={{ width: `${phoneticWidth}mm`, height: `100%` }}></div>
                            </div>
                        </div>
                    );
                }
                return <div style={{ width: `${totalWidth}mm`, height: `${totalHeight}mm`, borderRight: borderStyle, borderBottom: borderStyle, boxSizing: 'border-box' }}><GridBox /></div>;
            };

            return (
                <div className="flex flex-col md:flex-row h-screen w-full overflow-hidden bg-rice-50">
                    
                    {/* 左側控制面板 (Sidebar) */}
                    <div className="w-full md:w-[380px] flex-shrink-0 flex flex-col bg-stone-50 border-r border-stone-200 shadow-[2px_0_15px_-3px_rgba(0,0,0,0.05)] z-10 overflow-hidden">
                        
                        {/* 頂部標題 */}
                        <div className="p-6 border-b border-stone-200 bg-white">
                            <h1 className="text-2xl font-bold tracking-widest text-stone-800 flex items-center gap-3">
                                <span className="flex items-center justify-center w-8 h-8 bg-seal-500 text-white rounded text-lg shadow-inner">文</span>
                                AI 作業簿
                            </h1>
                            <p className="text-xs mt-2 text-stone-500 font-medium tracking-wide">自定義內容・線上練字帖生成</p>
                        </div>

                        {/* 滾動設定區 */}
                        <div className="flex-1 p-5 overflow-y-auto space-y-5">
                            
                            {/* 卡片 1：內容設定 */}
                            <div className="bg-white p-5 rounded-xl shadow-sm border border-stone-100">
                                <h2 className="flex items-center gap-2 text-sm font-bold text-stone-700 mb-4 pb-2 border-b border-stone-50"><PenTool /> 內容設定</h2>
                                <div className="space-y-4">
                                    <div>
                                        <textarea 
                                            value={inputText} onChange={(e) => setInputText(e.target.value)} 
                                            placeholder="輸入想練習的漢字..." 
                                            className="w-full h-24 p-3 border border-stone-200 rounded-lg bg-stone-50 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400 focus:bg-white transition-all resize-none shadow-inner" 
                                        />
                                        <div className="text-[10px] text-stone-400 text-right mt-1">支援換行與空格</div>
                                    </div>
                                    <div className="bg-stone-50 p-1.5 rounded-lg border border-stone-200 flex gap-1">
                                        {[{ id: 'none', label: '空白' }, { id: 'trace', label: '描紅(灰)' }, { id: 'solid', label: '範例(黑)' }].map(mode => (
                                            <button key={mode.id} onClick={() => setTextMode(mode.id)} 
                                                className={`flex-1 py-1.5 text-xs rounded-md transition-all ${textMode === mode.id ? 'bg-white text-stone-800 shadow shadow-stone-200 font-bold' : 'text-stone-500 hover:bg-stone-100'}`}>
                                                {mode.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* 卡片 2：格線與版面 */}
                            <div className="bg-white p-5 rounded-xl shadow-sm border border-stone-100">
                                <h2 className="flex items-center gap-2 text-sm font-bold text-stone-700 mb-4 pb-2 border-b border-stone-50"><Grid3X3 /> 樣式與排版</h2>
                                
                                <div className="mb-4">
                                    <label className="block text-xs font-semibold text-stone-500 mb-2">田格類型：</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        {[{ id: 'tian', label: '田字' }, { id: 'mi', label: '米字' }, { id: 'huigong', label: '回宮' }, { id: 'jiugong', label: '九宮' }, { id: 'none', label: '空白' }].map((item) => (
                                            <button key={item.id} onClick={() => setGridType(item.id)} 
                                                className={`py-2 text-xs rounded-lg border transition-all ${gridType === item.id ? 'bg-stone-700 text-white border-stone-700 shadow-md' : 'bg-stone-50 border-stone-200 hover:border-stone-400 text-stone-600'}`}>
                                                {item.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="mb-4">
                                    <label className="block text-xs font-semibold text-stone-500 mb-2">拼音/注音欄：</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        {[{ id: 'none', label: '無' }, { id: 'zhuyin', label: '注音(右)' }, { id: 'pinyin', label: '拼音(上)' }, { id: 'both', label: '雙拼(上+右)' }].map((type) => (
                                            <button key={type.id} onClick={() => setPhoneticType(type.id)} 
                                                className={`py-2 text-xs rounded-lg border transition-all ${phoneticType === type.id ? 'bg-stone-700 text-white border-stone-700 shadow-md' : 'bg-stone-50 border-stone-200 hover:border-stone-400 text-stone-600'}`}>
                                                {type.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-semibold text-stone-500 mb-2">線條顏色：</label>
                                    <div className="flex gap-2">
                                        {Object.keys(colors).map((key) => (
                                            <button key={key} onClick={() => setGridColor(key)} 
                                                className={`flex-1 py-2 rounded-lg border flex items-center justify-center gap-1.5 transition-all text-xs ${gridColor === key ? 'ring-2 ring-offset-1 bg-white font-bold shadow-sm' : 'opacity-60 hover:opacity-100 bg-stone-50 border-stone-200'}`} 
                                                style={{ ringColor: gridColor === key ? colors[key].stroke : 'transparent', color: colors[key].stroke }}>
                                                <div className="w-2.5 h-2.5 rounded-full shadow-inner" style={{ backgroundColor: colors[key].stroke }}></div>
                                                {colors[key].name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                        </div>

                        {/* 左側底部 */}
                        <div className="px-6 py-4 bg-stone-100/50 border-t border-stone-200">
                            <div className="text-xs flex items-center gap-2 text-stone-500 font-medium">
                                <Info size={14} />
                                <span>Sophia Wong編修</span>
                            </div>
                        </div>
                    </div>

                    {/* 右側預覽區 (Main Area) */}
                    <div className="flex-1 relative flex flex-col h-full overflow-hidden bg-stone-200/60">
                        
                        {/* 頂部工具列 */}
                        <div className="bg-white/80 backdrop-blur-md px-6 py-3 border-b border-stone-200 flex flex-wrap items-center justify-between gap-4 z-20 shadow-sm">
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-2 text-stone-700">
                                    <LayoutTemplate size={18} />
                                    <span className="font-bold text-sm tracking-wide">版面設定</span>
                                </div>
                                <div className="flex items-center gap-4 bg-stone-100 px-3 py-1.5 rounded-lg border border-stone-200">
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs text-stone-500 font-medium">直行(Rows):</span>
                                        <input type="number" min="1" max="25" value={rows} onChange={(e) => setRows(Number(e.target.value))} className="w-12 text-center border-none bg-white rounded shadow-sm text-stone-700 text-sm py-0.5 focus:ring-1 focus:ring-stone-400" />
                                    </div>
                                    <div className="w-px h-4 bg-stone-300"></div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs text-stone-500 font-medium">橫列(Cols):</span>
                                        <input type="number" min="1" max="15" value={cols} onChange={(e) => setCols(Number(e.target.value))} className="w-12 text-center border-none bg-white rounded shadow-sm text-stone-700 text-sm py-0.5 focus:ring-1 focus:ring-stone-400" />
                                    </div>
                                </div>
                            </div>
                            
                            {/* 下載按鈕 */}
                            <button id="export-btn" onClick={handleExportPdf} disabled={isGenerating} 
                                className={`flex items-center gap-2 px-6 py-2 rounded-lg shadow-md transition-all text-sm font-bold text-white
                                ${!isGenerating ? 'bg-seal-500 hover:bg-seal-600 active:scale-95' : 'bg-stone-400 cursor-wait'}`}>
                                <Download size={16} />{isGenerating ? "生成中..." : "匯出 PDF"}
                            </button>
                        </div>

                        {/* 紙張預覽區 (加入真實陰影與背景紋理) */}
                        <div className="flex-1 overflow-auto p-8 flex justify-center items-start hide-scrollbar">
                            <div ref={printRef} className="bg-white shadow-2xl relative mx-auto box-border ring-1 ring-stone-900/5 transition-all duration-300" 
                                style={{ 
                                    width: '210mm', height: '297mm', padding: '15mm', 
                                    backgroundImage: 'url("https://www.transparenttextures.com/patterns/rice-paper-2.png")', 
                                    backgroundSize: '300px' 
                                }}>
                                
                                <div className="w-full h-full flex flex-col items-center justify-start">
                                    <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cols}, auto)`, gap: '0mm', justifyContent: 'center', alignContent: 'start', borderTop: colors[gridColor].border, borderLeft: colors[gridColor].border, width: 'fit-content' }}>
                                        {Array.from({ length: rows * cols }).map((_, index) => {
                                            const cleanText = inputText.replace(/[\n\r]/g, '');
                                            const char = cleanText[index] || '';
                                            return <div key={index} className="flex-shrink-0"><CellUnit size={cellSize} char={char} mode={textMode} /></div>;
                                        })}
                                    </div>
                                </div>
                                
                                {/* 這裡已經將底部的文字完全移除，讓 PDF 保持最乾淨的狀態 */}
                                
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
